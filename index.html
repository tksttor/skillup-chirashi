<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本日の流れ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:1024px; height:768px;
    overflow:hidden;
    background:linear-gradient(155deg,#FFF0F7 0%,#FFFBF0 48%,#F0FFF8 100%);
    font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
    display:flex; flex-direction:column;
    position:relative;
  }

  .star {
    position:absolute; pointer-events:none;
    color:var(--c,#FFE566); font-size:var(--sz,11px);
    animation:twinkle var(--dur,2s) ease-in-out infinite;
    animation-delay:var(--delay,0s); z-index:6;
  }
  @keyframes twinkle {
    0%,100%{opacity:.12;transform:scale(.75) rotate(0deg);}
    50%    {opacity:.55;transform:scale(1.25) rotate(18deg);}
  }

  /* ── Header：全体をコンパクトに ── */
  .header {
    text-align:center;
    padding-top:10px;
    flex-shrink:0;
    position:relative; z-index:10;
  }
  .date-badge {
    display:inline-block;
    background:linear-gradient(90deg,#F9A8C9,#F0A0D0);
    color:white; font-size:17px; font-weight:700;
    padding:5px 22px; border-radius:20px;
    margin-bottom:4px; letter-spacing:1px;
    box-shadow:0 3px 12px rgba(249,168,201,.45);
  }
  .title-with-logo {
    display:inline-flex; align-items:center; gap:14px;
  }
  .title-main {
    font-size:72px; font-weight:900;
    color:#2D1B4E; letter-spacing:10px; line-height:1;
    white-space:nowrap;
  }
  .logo-img {
    width:74px; height:74px;
    object-fit:contain; background:transparent;
  }
  .title-deco {
    display:flex; align-items:center; justify-content:center;
    gap:10px; margin:4px 0 2px;
  }
  .title-deco-line { width:55px; height:1.5px; background:linear-gradient(90deg,transparent,#F0C0D8); }
  .title-deco-line.rev { background:linear-gradient(90deg,#F0C0D8,transparent); }
  .title-deco-flowers { color:#F9A8C9; font-size:14px; letter-spacing:5px; }
  .title-sub { font-size:14px; color:#9B8FA6; letter-spacing:7px; }

  /* ── Timeline ── */
  .timeline {
    display:flex; align-items:stretch;
    padding:8px 12px 0 12px;
    flex:1; min-height:0;
    gap:0; position:relative; z-index:10;
  }
  .timeline-connector {
    display:flex; align-items:center; justify-content:center;
    width:24px; flex-shrink:0;
  }
  .arrow {
    width:100%; height:2px;
    background:linear-gradient(90deg,#E8D0E8,#D4C0D4); position:relative;
  }
  .arrow::after {
    content:''; position:absolute; right:-6px; top:-4px;
    border-left:8px solid #D4C0D4;
    border-top:5px solid transparent; border-bottom:5px solid transparent;
  }

  /* ── Cards ── */
  .time-card {
    background:white; border-radius:14px;
    padding:10px 14px 10px;
    flex:1; min-width:0;
    display:flex; flex-direction:column;
    box-shadow:0 4px 18px rgba(0,0,0,.07);
    position:relative; overflow:hidden;
  }
  .time-card::before {
    content:''; position:absolute; top:0; left:0; right:0;
    height:5px; border-radius:14px 14px 0 0;
  }
  .card-pink::before  { background:linear-gradient(90deg,#F9A8C9,#F0A0D0); }
  .card-blue::before  { background:linear-gradient(90deg,#88BBFF,#B0CCFF); }
  .card-mint::before  { background:linear-gradient(90deg,#A8E6CF,#80D5B0); }

  .card-icon { position:absolute; top:10px; right:12px; font-size:20px; opacity:.38; }

  .time-header { display:flex; align-items:baseline; gap:4px; margin-top:6px; margin-bottom:3px; }
  /* ★ 時刻を大きく */
  .time-label { font-size:52px; font-weight:900; color:#2D1B4E; letter-spacing:-1px; line-height:1; }
  .time-tilde { font-size:28px; color:#9B8FA6; font-weight:300; }

  .time-duration {
    display:inline-block; font-size:14px; font-weight:700; color:white;
    padding:3px 12px; border-radius:12px; margin-bottom:6px; align-self:flex-start;
  }
  .card-pink .time-duration { background:#F9A8C9; }
  .card-blue .time-duration { background:#88BBFF; }
  .card-mint .time-duration { background:#80D5B0; }

  /* ★ タイトルも大きく */
  .time-title {
    font-size:20px; font-weight:700; color:#2D1B4E;
    line-height:1.45; margin-bottom:6px; flex-shrink:0;
  }
  .time-detail {
    display:flex; flex-wrap:wrap; gap:5px; margin-top:auto;
  }
  /* ★ タグも大きく */
  .tag {
    font-size:14px; padding:4px 11px; border-radius:8px;
    font-weight:500; color:#5C4A6E;
  }
  .card-pink .tag { background:#FDF0F7; }
  .card-blue .tag { background:#EFF5FF; }
  .card-mint .tag { background:#EDFAF5; }

  /* ── 15:30 終了テキスト（カードと草むらの間の独立した帯） ── */
  .end-bar {
    flex-shrink:0;
    height:38px;
    display:flex; align-items:center; justify-content:center;
    gap:16px;
    position:relative; z-index:10;
    margin:0 12px;
  }
  .end-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,#DDD0E8); }
  .end-line.rev { background:linear-gradient(90deg,#DDD0E8,transparent); }
  .end-text {
    font-size:28px; font-weight:900; color:#2D1B4E; letter-spacing:4px;
    white-space:nowrap;
  }
  .end-sub { font-size:17px; color:#9B8FA6; letter-spacing:3px; font-weight:600; }

  /* ── Grass（草むらは一番下の固定帯） ── */
  .grass-layer {
    flex-shrink:0;
    height:62px;
    position:relative; z-index:15;
    overflow:hidden;
  }
  .grass-layer svg { display:block; width:1024px; height:62px; }

  /* ── Cherry tree ── */
  .cherry-tree {
    position:absolute; bottom:0; right:0;
    z-index:16; pointer-events:none;
    width:188px; height:auto;
  }

  /* ── Rabbit ── */
  .rabbit-wrapper {
    position:absolute; bottom:42px; left:-80px;
    z-index:17; pointer-events:none;
    animation:rabbit-move 13s linear infinite;
  }
  @keyframes rabbit-move { 0%{transform:translateX(0);} 100%{transform:translateX(1150px);} }
  .rabbit-hop { animation:rabbit-hop .38s ease-in-out infinite alternate; }
  @keyframes rabbit-hop {
    0%  {transform:translateY(0)   rotate(-2deg);}
    100%{transform:translateY(-9px) rotate(2deg);}
  }
  .rabbit-hop svg { transform:scaleX(-1); }

  /* ── Petals ── */
  .petal {
    position:absolute; pointer-events:none; opacity:0;
    animation:petal-fall linear infinite; z-index:25;
  }
  @keyframes petal-fall {
    0%  {opacity:0;  transform:translateY(0)    translateX(0)              rotate(0deg);}
    6%  {opacity:.85;}
    92% {opacity:.70;}
    100%{opacity:0;  transform:translateY(820px) translateX(var(--dx,60px)) rotate(var(--spin,540deg));}
  }
  @keyframes flutter {
    0%,100%{transform:translate(0,0)      rotate(-4deg);}
    25%    {transform:translate(12px,-10px) rotate(5deg);}
    50%    {transform:translate(22px,4px)  rotate(-3deg);}
    75%    {transform:translate(12px,-7px) rotate(4deg);}
  }
</style>
</head>
